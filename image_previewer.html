<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Previewer - GalfitS Web</title>
    <style>
        :root {
            --bg: #f7f4ef;
            --panel: #ffffff;
            --text: #1f2933;
            --muted: #5f6c7b;
            --line: #d8dee7;
            --accent: #15616d;
            --accent-strong: #104f58;
            --ok-bg: #d9f7e4;
            --ok-text: #0f5132;
            --err-bg: #f9dede;
            --err-text: #842029;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Avenir Next", "Gill Sans", sans-serif;
            margin: 0;
            color: var(--text);
            background: linear-gradient(135deg, #f2efe8 0%, #edf5f7 100%);
        }
        .container {
            max-width: 1200px;
            margin: 22px auto;
            background-color: var(--panel);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 28px rgba(20, 30, 40, 0.08);
            border: 1px solid var(--line);
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .topbar a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 0.01em;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f6fafb;
            border: 1px solid var(--line);
            border-radius: 10px;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 120px;
            font-weight: 600;
        }
        input, button {
            padding: 5px 10px;
            margin: 2px;
            border: 1px solid var(--line);
            border-radius: 6px;
            font-family: inherit;
        }
        input[type="text"] {
            width: min(520px, 95%);
        }
        button {
            background-color: var(--accent);
            color: white;
            cursor: pointer;
            padding: 8px 15px;
            border: none;
        }
        button:hover {
            background-color: var(--accent-strong);
        }
        button:disabled {
            background-color: #8e99a7;
            cursor: not-allowed;
        }
        .image-container {
            text-align: center;
            margin: 20px 0;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background-color: #fbfdff;
            position: relative;
        }
        .image-wrapper {
            position: relative;
            display: inline-block;
        }
        #imageDisplay {
            max-width: 100%;
            height: auto;
            border: 1px solid #c8d3df;
            display: block;
        }
        .crosshair {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 10;
        }
        .crosshair::before,
        .crosshair::after {
            content: "";
            position: absolute;
            background: #0f172a;
        }
        .crosshair::before {
            width: 20px;
            height: 2px;
            top: 9px;
            left: 0;
        }
        .crosshair::after {
            width: 2px;
            height: 20px;
            top: 0;
            left: 9px;
        }
        .draggable-area {
            position: absolute;
            width: 20px;
            height: 20px;
            cursor: move;
            z-index: 11;
            background: transparent;
        }
        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .info-box {
            padding: 15px;
            background-color: #f8fbff;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            border: 1px solid var(--line);
        }
        .info-box h3 {
            margin-top: 0;
            color: #344054;
        }
        .coordinate-display {
            font-family: Menlo, Monaco, Consolas, monospace;
            background-color: #ffffff;
            padding: 10px;
            border-radius: 6px;
            margin: 5px 0;
            border: 1px solid var(--line);
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            display: none;
        }
        .status.success {
            background-color: var(--ok-bg);
            color: var(--ok-text);
            border: 1px solid #b7ebc8;
        }
        .status.error {
            background-color: var(--err-bg);
            color: var(--err-text);
            border: 1px solid #f0b6ba;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #edf1f5;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .mode-toggle {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #edf7fa;
            border-radius: 8px;
            border: 1px solid var(--line);
        }
        .mode-toggle input[type="radio"] {
            margin-right: 5px;
        }
        .file-mode {
            display: none;
        }
        .path-mode {
            display: none;
        }
        .example-text {
            font-size: 0.9em;
            color: var(--muted);
            font-style: italic;
        }
        .coord-section {
            margin-bottom: 10px;
            padding: 8px;
            border-left: 3px solid var(--accent);
            background-color: #ffffff;
            border-radius: 4px;
        }
        .coord-label {
            font-weight: 600;
            color: #344054;
            margin-bottom: 5px;
        }
        @media (max-width: 900px) {
            .info-panel {
                grid-template-columns: 1fr;
            }
            label {
                width: 105px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>Interactive Image Previewer</h1>
            <a href="/">Back to Tool List</a>
        </div>

        <div class="controls">
            <div class="mode-toggle">
                <label>
                    <input type="radio" name="inputMode" value="upload" checked>
                    Upload File from Local Machine
                </label>
                <br>
                <label>
                    <input type="radio" name="inputMode" value="path">
                    Use Server File Path
                </label>
            </div>

            <div class="file-mode" id="fileMode">
                <div class="control-group">
                    <label for="imageFile">Image File:</label>
                    <input type="file" id="imageFile" accept=".fits,.fit">
                </div>
            </div>

            <div class="path-mode" id="pathMode">
                <div class="control-group">
                    <label for="imagePath">File Path:</label>
                    <input type="text" id="imagePath" placeholder="/Users/liruancun/path/to/your/image.fits">
                    <br>
                    <span class="example-text">Example: /Users/liruancun/Works/...</span>
                </div>
            </div>

            <div class="control-group">
                <label for="ra">RA (degrees):</label>
                <input type="number" id="ra" step="any" placeholder="e.g., 150.0">

                <label for="dec">DEC (degrees):</label>
                <input type="number" id="dec" step="any" placeholder="e.g., 2.0">
            </div>

            <div class="control-group">
                <label for="layer">HDU Layer:</label>
                <input type="number" id="layer" value="0" min="0">

                <label for="cutRadius">Cut Radius:</label>
                <input type="number" id="cutRadius" value="1000" min="10">
            </div>

            <div class="control-group">
                <button id="loadBtn">Load Image</button>
                <button id="clearBtn" disabled>Clear</button>
            </div>
        </div>

        <div class="status" id="statusMsg"></div>

        <div class="loading" id="loadingDiv">
            <div class="spinner"></div>
            <p>Processing image...</p>
        </div>

        <div class="image-container" id="imageContainer" style="display: none;">
            <div class="image-wrapper" id="imageWrapper">
                <img id="imageDisplay" alt="Image Preview">
                <div class="crosshair" id="crosshair"></div>
                <div class="draggable-area" id="draggableArea"></div>
            </div>
        </div>

        <div class="info-panel" id="infoPanel" style="display: none;">
            <div class="info-box">
                <h3>Mouse Position</h3>
                <div class="coord-section">
                    <div class="coord-label">Current Position:</div>
                    <div class="coordinate-display">
                        <div>Pixel X: <span id="mousePixelX">-</span></div>
                        <div>Pixel Y: <span id="mousePixelY">-</span></div>
                        <div>dRA: <span id="mouseDeltaRA">-</span> arcsec</div>
                        <div>dDec: <span id="mouseDeltaDec">-</span> arcsec</div>
                    </div>
                </div>
            </div>

            <div class="info-box">
                <h3>Nearest Peak (within 15 pix)</h3>
                <div class="coord-section">
                    <div class="coord-label">Peak Position:</div>
                    <div class="coordinate-display">
                        <div>Pixel X: <span id="peakPixelX">-</span></div>
                        <div>Pixel Y: <span id="peakPixelY">-</span></div>
                        <div>dRA: <span id="peakDeltaRA">-</span> arcsec</div>
                        <div>dDec: <span id="peakDeltaDec">-</span> arcsec</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/src/image_previewer.js"></script>
</body>
</html>
